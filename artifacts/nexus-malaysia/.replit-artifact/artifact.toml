kind = "web"
previewPath = "/"
title = "Nexus Malaysia"
version = "1.0.0"
id = "artifacts/nexus-malaysia"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24177

[services.development]
run = "pnpm --filter @workspace/nexus-malaysia run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nexus-malaysia", "run", "build" ]
publicDir = "artifacts/nexus-malaysia/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24177"
BASE_PATH = "/"
